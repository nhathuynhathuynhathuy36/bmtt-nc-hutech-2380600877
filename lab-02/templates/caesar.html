<!DOCTYPE html>
<html lang="en">

<head>
    <title>Caesar Cipher</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>

<body>
    <div class="container">
        <table class="table">
            <tr>
                <td style="text-align: center; font-weight: bold; font-size: 25px;">
                    CAESAR CIPHER
                </td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue;">
                    ENCRYPTION
                </td>
            </tr>

            <tr>
                <td>
                    <form method="POST" action="/encrypt">
                        <div class="mb-3">
                            <label class="form-label">Plain text:</label>
                            <input
                                type="text"
                                class="form-control"
                                name="inputPlainText"
                                placeholder="Input Plain Text"
                                required
                                autofocus
                                value="{{ plain_text if plain_text else '' }}"
                            />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input
                                type="number"
                                class="form-control"
                                name="inputKeyPlain"
                                placeholder="Input Key"
                                required
                                value="{{ key_plain if key_plain else '' }}"
                            />
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Encrypt
                        </button>
                    </form>

                    {% if encrypted_text %}
                    <div class="alert alert-info mt-3">
                        <strong>Cipher text:</strong> {{ encrypted_text }}
                    </div>
                    {% endif %}
                </td>
            </tr>

            <tr>
                <td style="font-weight: bold; color: blue;">
                    DECRYPTION
                </td>
            </tr>

            <tr>
                <td>
                    <form method="POST" action="/decrypt">
                        <div class="mb-3">
                            <label class="form-label">Cipher text:</label>
                            <input
                                type="text"
                                class="form-control"
                                name="inputCipherText"
                                placeholder="Input Cipher Text"
                                required
                                value="{{ cipher_text if cipher_text else '' }}"
                            />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Key:</label>
                            <input
                                type="number"
                                class="form-control"
                                name="inputKeyCipher"
                                placeholder="Input Key"
                                required
                                value="{{ key_cipher if key_cipher else '' }}"
                            />
                        </div>

                        <button type="submit" class="btn btn-success">
                            Decrypt
                        </button>
                    </form>

                    {% if decrypted_text %}
                    <div class="alert alert-success mt-3">
                        <strong>Plain text:</strong> {{ decrypted_text }}
                    </div>
                    {% endif %}
                </td>
            </tr>
        </table>
    </div>
</body>

</html>
